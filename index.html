<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Sahayak - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="logo">
                <svg width="60" height="60" viewBox="0 0 60 60" fill="none">
                    <circle cx="30" cy="30" r="28" fill="#FF6B35" opacity="0.1"/>
                    <path d="M30 15C21.716 15 15 21.716 15 30C15 38.284 21.716 45 30 45C38.284 45 45 38.284 45 30C45 21.716 38.284 15 30 15ZM30 25C32.761 25 35 27.239 35 30C35 32.761 32.761 35 30 35C27.239 35 25 32.761 25 30C25 27.239 27.239 25 30 25Z" fill="#FF6B35"/>
                </svg>
            </div>
            <h1>Welcome to AI-Sahayak</h1>
            <p class="subtitle">Digital Assistant for Bharat</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="Enter your full name" required>
                </div>
                
                <div class="input-group">
                    <label for="mobile">Mobile Number</label>
                    <input type="tel" id="mobile" placeholder="Enter 10-digit mobile number" pattern="[0-9]{10}" required>
                </div>
                
                <button type="submit" class="btn-primary">Send OTP</button>
                <button type="button" class="btn-secondary" onclick="location.href='dashboard.html'">Continue as Guest</button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
